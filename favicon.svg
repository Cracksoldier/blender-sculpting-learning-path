<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0d1117"/>
  <!-- Wireframe sphere (sculpting mesh) -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#f97316" stroke-width="2"/>
  <ellipse cx="32" cy="36" rx="18" ry="7" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="32" cy="36" rx="18" ry="12" fill="none" stroke="#f97316" stroke-width="0.8" opacity="0.35"/>
  <line x1="32" y1="18" x2="32" y2="54" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  <line x1="14" y1="36" x2="50" y2="36" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  <!-- Sculpting brush (handle + tip) -->
  <line x1="48" y1="6" x2="24" y2="30" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="21.5" y="27.5" width="6" height="3" rx="1" fill="#6b7280" transform="rotate(-45 24.5 29)"/>
  <!-- Brush contact point with glow effect -->
  <circle cx="22" cy="30" r="4" fill="#f97316" opacity="0.25"/>
  <circle cx="22" cy="30" r="2.5" fill="#ffb74d"/>
</svg>
